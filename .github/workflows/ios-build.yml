name: iOS IPA Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.3"
          channel: stable
          architecture: arm64
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install iOS pods with debug
        shell: bash
        run: |
          set -e

          echo "=== Podfile ==="
          cat ios/Podfile

          echo "=== Check conflict markers ==="
          grep -n "<<<<<<<\|=======\|>>>>>>>" ios/Podfile && exit 1 || true

          echo "=== pubspec packages ==="
          grep -n "mobile_scanner\|google_mlkit_text_recognition\|google_mlkit_commons" pubspec.yaml || true

          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update --verbose
          cd ..

      - name: Build iOS App No Sign
        shell: bash
        run: |
          set +e

          flutter build ios --release --no-codesign -v 2>&1 | tee flutter_ios_build.log
          BUILD_STATUS=${PIPESTATUS[0]}

          echo ""
          echo "==================== ERRORS ONLY ===================="
          grep -nEi "error:|Swift Compiler Error|Semantic Issue|Lexical or Preprocessor Issue|Command PhaseScriptExecution failed|No such module|Undefined symbols|ld:|Failed to build iOS app" flutter_ios_build.log | tail -200 || true
          echo "====================================================="
          echo ""

          exit $BUILD_STATUS

      - name: Upload iOS build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-build-log
          path: flutter_ios_build.log

      - name: Create unsigned IPA
        run: |
          rm -rf build/ios/ipa
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -r app-release-unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-release-unsigned
          path: build/ios/ipa/app-release-unsigned.ipa
