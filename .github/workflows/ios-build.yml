name: iOS IPA Build

on:
  push:
    branches: [ main, master ] 

jobs:
  build:
    runs-on: macos-latest 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.3' 

    - name: Install dependencies
      run: flutter pub get

    - name: Install iOS pods with debug
      run: |
          set -e
          echo "=== Podfile ==="
          cat ios/Podfile

          echo "=== Check conflict markers ==="
          grep -n "<<<<<<<\|=======\|>>>>>>>" ios/Podfile && exit 1 || true

          echo "=== pubspec packages ==="
          grep -n "mobile_scanner\|google_mlkit_text_recognition\|google_mlkit_commons" pubspec.yaml || true

          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update --verbose
          cd ..

    - name: Build iOS App No Sign
      run: flutter build ios --release --no-codesign -v

    - name: Create IPA Directory
      run: |
        mkdir -p build/ios/iphoneos
        cd build/ios/iphoneos
        mkdir Payload
        ln -s ../../../build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app Payload/Runner.app
        zip -r app-release.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-app-release
        path: build/ios/iphoneos/app-release.ipa
