name: iOS IPA Build

on:
  push:
    branches: [ main, master ] 

jobs:
  build:
    runs-on: macos-latest 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.3' 

    - name: Install dependencies
      run: flutter pub get

    - name: Build iOS App (No Sign)
      run: flutter build ios --no-codesign 

    - name: Create IPA Directory
      run: |
        mkdir -p build/ios/iphoneos
        cd build/ios/iphoneos
        mkdir Payload
        ln -s ../../../build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app Payload/Runner.app
        zip -r app-release.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v3
      with:
        name: ios-app-release
        path: build/ios/iphoneos/app-release.ipa
