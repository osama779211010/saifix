name: saifix
description: "saifix app"
publish_to: 'none'
version: 1.0.0+2
environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.2
  flutter_animate: ^4.5.2
  flutter_svg: ^2.2.2
  local_auth: ^2.3.0
  local_auth_android: any
  local_auth_ios: any
  image_picker: ^1.0.7
  device_info_plus: ^11.1.1
  http: ^1.2.0
  flutter_contacts: ^1.1.9+2
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  flutter_local_notifications: ^18.0.1
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^13.0.1

  url_launcher: any
  easy_localization: any
  flutter_localizations:
    sdk: flutter
  firebase_core: any
  workmanager: any
  google_mlkit_text_recognition: any
  pinput: any
  smart_auth: any
  pdf: any
  printing: any
  path_provider: any
  open_filex: any
  screenshot: any
  share_plus: any
  gal: any
  camera: any
  permission_handler: any
  package_info_plus: any
  flutter_background_service: any
  web_socket_channel: any
  firebase_messaging: any
  audioplayers: any
  speech_to_text: any
dependency_overrides:
  intl: ^0.19.0
  mobile_scanner: ^6.0.2
  google_mlkit_text_recognition: ^0.14.0
  package_info_plus: ^8.0.0
  screenshot: ^3.0.0
  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.5
  share_plus: ^11.1.0
  url_launcher: ^6.3.1
  workmanager: ^0.7.0
  firebase_core: ^3.4.0
  firebase_messaging: ^15.1.0
  speech_to_text: ^7.3.0
  permission_handler: ^11.3.1
  camera: ^0.11.0+2
  web_socket_channel: ^3.0.1
  flutter_background_service: ^5.1.0
  flutter_gen: ^5.13.0+1
  audioplayers: ^5.2.1
  pinput: 6.0.2
  smart_auth: ^3.2.0
  easy_localization: ^3.0.8
  gal: ^2.1.3
  open_filex: ^4.5.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "logo.ico"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF5F"
  adaptive_icon_foreground: "logo.ico"

flutter:
  generate: false
  uses-material-design: true
  assets:
    - logo.ico
    - logo_circle.png
    - pr_logo.png
    - "back 1 .png"
    - back2.png
    - assets/images/networks/
    - assets/images/networks/Yemen_Telc.png
    - assets/images/networks/YemenMobile.png
    - assets/images/networks/sabafon.png
    - assets/images/networks/MTN.png
    - assets/sounds/
    - assets/translations/
    - assets/images/
